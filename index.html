<!DOCTYPE html>
<html lang="ro">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Grile Macro</title>
  <style>
    :root {
      --bg: #f0f4ff;
      --accent: #0ea5e9;
      --accent-dark: #0284c7;
      --card: #ffffff;
      --text: #1f2937;
      --muted: #6b7280;
      --border: #dbe3ef;
    }
    * { box-sizing: border-box; margin: 0; padding: 0; }
    body {
      font-family: Arial, Helvetica, sans-serif;
      background: var(--bg);
      color: var(--text);
      min-height: 100vh;
    }
    header {
      background: linear-gradient(135deg, #0369a1, #0ea5e9);
      color: white;
      padding: 36px 20px 28px;
      text-align: center;
    }
    header h1 {
      font-size: clamp(22px, 5vw, 36px);
      margin-bottom: 8px;
    }
    header p {
      opacity: .9;
      font-size: 15px;
    }
    main {
      max-width: 700px;
      margin: 28px auto;
      padding: 0 16px 60px;
    }
    .section-title {
      font-size: 13px;
      font-weight: 700;
      text-transform: uppercase;
      letter-spacing: .08em;
      color: var(--muted);
      margin: 28px 0 10px;
    }
    a.module-btn {
      display: flex;
      align-items: center;
      gap: 14px;
      background: var(--card);
      border: 1px solid var(--border);
      border-radius: 14px;
      padding: 16px 18px;
      margin: 10px 0;
      text-decoration: none;
      color: var(--text);
      box-shadow: 0 4px 14px rgba(15,23,42,.06);
      transition: transform .1s ease, box-shadow .1s ease;
    }
    a.module-btn:hover {
      transform: translateY(-2px);
      box-shadow: 0 8px 24px rgba(15,23,42,.10);
      border-color: var(--accent);
    }
    a.module-btn:active {
      transform: translateY(0);
    }
    .num {
      display: inline-flex;
      align-items: center;
      justify-content: center;
      min-width: 44px;
      height: 44px;
      border-radius: 10px;
      background: #e0f2fe;
      color: #0369a1;
      font-weight: 800;
      font-size: 20px;
      flex-shrink: 0;
    }
    .btn-text { flex: 1; }
    .btn-title {
      font-weight: 700;
      font-size: 15px;
    }
    .btn-sub {
      font-size: 12px;
      color: var(--muted);
      margin-top: 2px;
    }
    .arrow {
      color: var(--muted);
      font-size: 18px;
    }
    footer {
      text-align: center;
      color: var(--muted);
      font-size: 13px;
      padding: 20px;
    }
  </style>
</head>
<body>
<header>
  <h1>📊 Grile Macroeconomie</h1>
  <p>Selectează setul de grile pe care vrei să îl exersezi</p>
</header>
<main>
  <div class="section-title">Materii</div>
  <a class="module-btn" href="grile_macro.html">
    <span class="num">📈</span>
    <div class="btn-text">
      <div class="btn-title">Macroeconomie — Grile complete</div>
      <div class="btn-sub">110 întrebări · IS-LM, Phillips, Okun, Balanța de Plăți, Multiplicatori</div>
    </div>
    <span class="arrow">›</span>
  </a>
</main>
<footer>Grile ASE — uz personal</footer>
</body>
</html>
